version: '3.8'

services:
  sb-easy:
    build: .
    container_name: sb-easy
    restart: unless-stopped
    ports:
      - "51821:51821/tcp"       # Web UI (same port as wg-easy)
      - "51820:51820/udp"       # WireGuard UDP
    cap_add:
      - NET_ADMIN              # Required for `wg` and `iptables`
      - SYS_MODULE             # For WireGuard kernel module
    volumes:
      - /etc/wireguard:/etc/wireguard:rw
      - sb-easy-data:/app/data
    environment:
      - BIND_ADDR=0.0.0.0:51821
      - DATABASE_URL=sqlite:/app/data/sb-easy.db?mode=rwc
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - WG_INTERFACE=wg0
      - WG_PORT=51820
      - WG_ADDRESS=10.59.32.1/24
      - WG_DNS=10.59.32.1
      - WG_MTU=1420
      - WG_POST_UP=iptables -t nat -A POSTROUTING -s 10.59.32.0/24 -o eth0 -j MASQUERADE; iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT
      - WG_POST_DOWN=iptables -t nat -D POSTROUTING -s 10.59.32.0/24 -o eth0 -j MASQUERADE; iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT
      - SINGBOX_API_URL=http://10.168.1.5:9090
      - SINGBOX_API_SECRET=${SINGBOX_API_SECRET:-}
      - EXTERNAL_HOSTNAME=39.108.98.208
      - RUST_LOG=info
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:51821/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    network_mode: bridge

volumes:
  sb-easy-data:
    name: sb-easy-data
