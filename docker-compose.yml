# sb-easy — all-in-one panel that supervises the bundled sing-box in process.
# No separate sing-box install: the image contains and manages it.
#
# Host networking is used because sb-easy is a VPN gateway: the WireGuard hub
# (UDP 51820), sing-box tun, and Clash API all need to live in the host network
# namespace, exactly like a bare-metal install.
#
# Quick start:
#   JWT_SECRET=$(openssl rand -hex 32) EXTERNAL_HOSTNAME=your.host \
#     docker compose up -d --build
#
# NOTE: do not run this on a box that already runs sing-box on :9090 / a tun —
# the managed instance would conflict. Stop the old one first.

services:
  sb-easy:
    build: .
    image: sb-easy:latest
    container_name: sb-easy
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN          # wg / ip / iptables / tun
      - SYS_MODULE         # load the wireguard kernel module if absent
    devices:
      - /dev/net/tun:/dev/net/tun   # sing-box tun inbound
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./data:/app/data            # DB + generated sing-box config persist here
    environment:
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - EXTERNAL_HOSTNAME=${EXTERNAL_HOSTNAME:-127.0.0.1}
      - SINGBOX_API_SECRET=${SINGBOX_API_SECRET:-}
      - WG_PORT=51820
      - WG_ADDRESS=10.59.32.1/24
      - WG_DNS=10.59.32.1
      # SINGBOX_MANAGED / SINGBOX_BIN / SINGBOX_API_URL default to managed mode
      # via the image (see Dockerfile ENV); override here if needed.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:51821/api/system/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
